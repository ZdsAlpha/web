<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430" role="img" aria-labelledby="title desc">
  <title id="title">Agentic optimization loop</title>
  <desc id="desc">A flow diagram showing goal, brief, agents, run, score, and ledger in an agentic optimization loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#334155"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 700 25px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .subtitle { fill: #475569; font: 500 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .label { fill: #0f172a; font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .small { fill: #475569; font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .strong { fill: #f8fafc; stroke: #334155; stroke-width: 1.8; }
      .rules { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.8; }
      .line { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="680" height="430" fill="url(#bg)"/>
  <text class="title" x="32" y="42">Agentic Optimization Loop</text>
  <text class="subtitle" x="32" y="66">Agents generate options. Evaluation and memory decide what improves.</text>

  <rect class="box" x="32" y="105" width="104" height="82" rx="12"/>
  <text class="label" x="84" y="139" text-anchor="middle">Goal</text>
  <text class="small" x="84" y="164" text-anchor="middle">Improve BPB</text>

  <rect class="box" x="164" y="105" width="104" height="82" rx="12"/>
  <text class="label" x="216" y="139" text-anchor="middle">Brief</text>
  <text class="small" x="216" y="161" text-anchor="middle">Champion</text>
  <text class="small" x="216" y="177" text-anchor="middle">plus rules</text>

  <rect class="box" x="296" y="105" width="104" height="82" rx="12"/>
  <text class="label" x="348" y="139" text-anchor="middle">Agents</text>
  <text class="small" x="348" y="161" text-anchor="middle">Propose</text>
  <text class="small" x="348" y="177" text-anchor="middle">candidates</text>

  <rect class="box" x="428" y="105" width="104" height="82" rx="12"/>
  <text class="label" x="480" y="139" text-anchor="middle">Run</text>
  <text class="small" x="480" y="161" text-anchor="middle">Train and</text>
  <text class="small" x="480" y="177" text-anchor="middle">serve logprobs</text>

  <rect class="strong" x="560" y="105" width="88" height="82" rx="12"/>
  <text class="label" x="604" y="139" text-anchor="middle">Score</text>
  <text class="small" x="604" y="161" text-anchor="middle">Held-out</text>
  <text class="small" x="604" y="177" text-anchor="middle">BPB</text>

  <rect class="strong" x="250" y="292" width="180" height="82" rx="12"/>
  <text class="label" x="340" y="326" text-anchor="middle">Ledger</text>
  <text class="small" x="340" y="349" text-anchor="middle">Scores, failures,</text>
  <text class="small" x="340" y="365" text-anchor="middle">next hypotheses</text>

  <rect class="rules" x="32" y="270" width="166" height="110" rx="12"/>
  <text class="label" x="115" y="303" text-anchor="middle">Guardrails</text>
  <text class="small" x="55" y="330">Fixed budget</text>
  <text class="small" x="55" y="350">Held-out eval</text>
  <text class="small" x="55" y="370">Sigma gate</text>

  <path class="line" d="M136 146 H156"/>
  <path class="line" d="M268 146 H288"/>
  <path class="line" d="M400 146 H420"/>
  <path class="line" d="M532 146 H552"/>
  <path class="line" d="M604 187 C604 260 510 333 440 333"/>
  <path class="line" d="M250 333 C198 326 190 248 213 197"/>
  <path class="dash" d="M198 325 H240"/>

</svg>
